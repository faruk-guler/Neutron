<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Neutron v10</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="login-container" style="max-width: 400px; margin: 5rem auto; padding: 2rem; background: var(--secondary-bg-color); border-radius: 0.5rem; box-shadow: var(--box-shadow);">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Neutron v10" style="height: 64px; margin-bottom: 1rem;">
            <h1 style="margin-bottom: 0;">Neutron v10</h1>
            <p style="color: #8b949e; font-size: 0.9rem;">Automation Control Center</p>
        </div>
        {% if error %}
        <div class="alert alert-danger" style="color: var(--danger-color); margin-bottom: 1rem;">{{ error }}</div>
        {% endif %}
        <form method="post">
            <div style="margin-bottom: 1rem;">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" required style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" required style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <!-- Registration disabled for security -->
    </div>
</body>
</html>
