<!DOCTYPE html>
<html lang="en" data-theme="{{ request.cookies.get('theme', 'light') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Neutron v10{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
    <div class="progress-bar"></div>
    
    <div class="mobile-header">
        <button id="menu-toggle" class="menu-toggle">☰</button>
        <div class="sidebar-logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Neutron v10" style="height: 32px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));">
            <span>Neutron v10</span>
        </div>
    </div>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Neutron v10" style="height: 32px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));">
                <span>Neutron v10</span>
            </div>
        </div>
        
        <div class="sidebar-menu">
            <a href="{{ url_for('index') }}" class="sidebar-item {% if active_page == 'dashboard' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard">
                    <rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>
                </svg>
                Dashboard
            </a>
            
            <a href="{{ url_for('index') }}#inventory" class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-server">
                    <rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/>
                </svg>
                Inventory
            </a>
            
            <a href="{{ url_for('index') }}#terminal-section" class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-terminal">
                    <polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/>
                </svg>
                Terminal
            </a>

            <a href="{{ url_for('audit_log') }}" class="sidebar-item {% if active_page == 'audit' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-history">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
                </svg>
                Audit Log
            </a>
        </div>
        
        <div class="theme-toggle">
            <span>Dark Mode</span>
            <form id="theme-form" action="{{ url_for('toggle_theme') }}" method="post">
                <input type="hidden" name="theme" value="light">
                <label class="toggle-switch">
                    <input type="checkbox" id="theme-toggle" {% if request.cookies.get('theme') == 'dark' %}checked{% endif %}>
                    <span class="toggle-slider"></span>
                </label>
            </form>
        </div>
    </div>
    
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/neutron.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
